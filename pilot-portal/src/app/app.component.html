<div *ngIf="!isLoginPage(); else loginPage" class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-cyan-50 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950">
  <div class="flex h-screen">
    <app-sidebar></app-sidebar>

    <div class="flex flex-col flex-1">
      <app-header></app-header>

      <main class="p-6 overflow-auto flex-1 animate-fade-in">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
  <app-chatbot></app-chatbot>
  <app-toast></app-toast>

</div>

<ng-template #loginPage>
  <div class="min-h-screen">
    <router-outlet></router-outlet>
  </div>
</ng-template>
