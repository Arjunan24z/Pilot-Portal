<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 relative overflow-hidden">
  
  <!-- Animated Background Elements -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-indigo-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-pulse-slow"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-pulse-slow" style="animation-delay: 2s;"></div>
    <div class="absolute top-1/2 left-1/2 w-80 h-80 bg-blue-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-pulse-slow" style="animation-delay: 4s;"></div>
  </div>

  <!-- Aircraft Pattern Background -->
  <div class="absolute inset-0 opacity-5">
    <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="aircraft-pattern-register" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
          <path d="M50,30 L60,50 L50,45 L40,50 Z" fill="currentColor" class="text-white"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#aircraft-pattern-register)"/>
    </svg>
  </div>

  <div class="w-full max-w-md relative z-10 px-6">
    
    <!-- Logo and Title -->
    <div class="text-center mb-8 animate-fly-in">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-500 shadow-2xl mb-4">
        <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 20 20">
          <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
        </svg>
      </div>
      <h1 class="text-4xl font-bold text-white mb-2">
        Join Pilot Portal
      </h1>
      <p class="text-indigo-200">
        Start your professional flight journey today
      </p>
    </div>

    <!-- Register Card -->
    <div class="glass rounded-2xl shadow-2xl p-8 backdrop-blur-xl border border-white/20 animate-fly-in" style="animation-delay: 0.2s;">
      
      <h2 class="text-2xl font-bold text-white text-center mb-6">
        Create Your Account
      </h2>

      <form (ngSubmit)="register()" class="space-y-4">

        <!-- Full Name -->
        <div>
          <label class="block text-indigo-100 text-sm font-medium mb-2">Full Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input
              [(ngModel)]="name"
              name="name"
              required
              class="w-full pl-10 pr-4 py-3 rounded-lg bg-slate-900/50 border border-indigo-500/30 text-white placeholder-indigo-300/50 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
              placeholder="Captain John Smith"
            />
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-indigo-100 text-sm font-medium mb-2">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
              </svg>
            </div>
            <input
              [(ngModel)]="email"
              name="email"
              type="email"
              required
              class="w-full pl-10 pr-4 py-3 rounded-lg bg-slate-900/50 border border-indigo-500/30 text-white placeholder-indigo-300/50 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
              placeholder="pilot@example.com"
            />
          </div>
        </div>

        <!-- Phone -->
        <div>
          <label class="block text-indigo-100 text-sm font-medium mb-2">Phone Number (Optional)</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
              </svg>
            </div>
            <input
              [(ngModel)]="phone"
              name="phone"
              type="tel"
              class="w-full pl-10 pr-4 py-3 rounded-lg bg-slate-900/50 border border-indigo-500/30 text-white placeholder-indigo-300/50 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
              placeholder="+1 (555) 123-4567"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-indigo-100 text-sm font-medium mb-2">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input
              [(ngModel)]="password"
              name="password"
              type="password"
              required
              class="w-full pl-10 pr-4 py-3 rounded-lg bg-slate-900/50 border border-indigo-500/30 text-white placeholder-indigo-300/50 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
              placeholder="Create a strong password"
            />
          </div>
          <p class="text-xs text-indigo-300 mt-1">Minimum 8 characters recommended</p>
        </div>

        <!-- Terms and Conditions -->
        <div class="flex items-start">
          <input type="checkbox" required class="mt-1 mr-2 rounded border-indigo-500/30 bg-slate-900/50 text-indigo-600 focus:ring-indigo-500">
          <label class="text-sm text-indigo-200">
            I agree to the <a href="#" class="text-purple-400 hover:text-purple-300 underline">Terms of Service</a> and <a href="#" class="text-purple-400 hover:text-purple-300 underline">Privacy Policy</a>
          </label>
        </div>

        <!-- Error -->
        <div *ngIf="error" class="p-3 rounded-lg bg-red-500/10 border border-red-500/30 flex items-center gap-2 animate-fly-in">
          <svg class="w-5 h-5 text-red-400" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
          </svg>
          <p class="text-red-300 text-sm">{{ error }}</p>
        </div>

        <!-- Success -->
        <div *ngIf="success" class="p-3 rounded-lg bg-green-500/10 border border-green-500/30 flex items-center gap-2 animate-fly-in">
          <svg class="w-5 h-5 text-green-400" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
          </svg>
          <p class="text-green-300 text-sm">{{ success }}</p>
        </div>

        <!-- Register Button -->
        <button
          type="submit"
          class="w-full py-3 px-4 rounded-lg bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold shadow-lg hover:shadow-xl transition-all duration-200 transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2">
          <span>Create Account</span>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
          </svg>
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <div class="flex-1 border-t border-indigo-500/30"></div>
        <span class="px-4 text-indigo-300 text-sm">Already have an account?</span>
        <div class="flex-1 border-t border-indigo-500/30"></div>
      </div>

      <!-- Login Link -->
      <div class="text-center">
        <a routerLink="/login" class="inline-flex items-center gap-2 text-purple-400 hover:text-purple-300 font-medium transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12" />
          </svg>
          <span>Sign in instead</span>
        </a>
      </div>

    </div>

    <!-- Footer -->
    <div class="text-center mt-6 text-indigo-200 text-sm animate-fly-in" style="animation-delay: 0.4s;">
      <p>Secure • Professional • Certified</p>
    </div>

  </div>
</div>
