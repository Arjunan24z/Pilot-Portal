<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 relative overflow-hidden">
  
  <!-- Animated Background Elements -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-blue-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-pulse-slow"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-cyan-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-pulse-slow" style="animation-delay: 2s;"></div>
    <div class="absolute top-1/2 left-1/2 w-80 h-80 bg-indigo-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-pulse-slow" style="animation-delay: 4s;"></div>
  </div>

  <!-- Aircraft Pattern Background -->
  <div class="absolute inset-0 opacity-5">
    <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="aircraft-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
          <path d="M50,30 L60,50 L50,45 L40,50 Z" fill="currentColor" class="text-white"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#aircraft-pattern)"/>
    </svg>
  </div>

  <div class="w-full max-w-md relative z-10 px-6">
    
    <!-- Logo and Title -->
    <div class="text-center mb-8 animate-fly-in">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-blue-500 to-cyan-500 shadow-2xl mb-4">
        <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 20 20">
          <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
        </svg>
      </div>
      <h1 class="text-4xl font-bold text-white mb-2">
        Pilot Portal
      </h1>
      <p class="text-blue-200">
        Your Flight Operations Command Center
      </p>
    </div>

    <!-- Login Card -->
    <div class="glass rounded-2xl shadow-2xl p-8 backdrop-blur-xl border border-white/20 animate-fly-in" style="animation-delay: 0.2s;">
      
      <h2 class="text-2xl font-bold text-white text-center mb-6">
        Welcome Back, Pilot
      </h2>

      <form (ngSubmit)="login()" class="space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-blue-100 text-sm font-medium mb-2">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
              </svg>
            </div>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              required
              class="w-full pl-10 pr-4 py-3 rounded-lg bg-slate-900/50 border border-blue-500/30 text-white placeholder-blue-300/50 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
              placeholder="pilot@example.com"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-blue-100 text-sm font-medium mb-2">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input
              type="password"
              [(ngModel)]="password"
              name="password"
              required
              class="w-full pl-10 pr-4 py-3 rounded-lg bg-slate-900/50 border border-blue-500/30 text-white placeholder-blue-300/50 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
              placeholder="Enter your password"
            />
          </div>
        </div>

        <!-- Remember & Forgot -->
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center text-blue-200 cursor-pointer">
            <input type="checkbox" class="mr-2 rounded border-blue-500/30 bg-slate-900/50 text-blue-600 focus:ring-blue-500">
            Remember me
          </label>
          <a href="#" class="text-cyan-400 hover:text-cyan-300 font-medium">
            Forgot password?
          </a>
        </div>

        <!-- Error -->
        <div *ngIf="error" class="p-3 rounded-lg bg-red-500/10 border border-red-500/30 flex items-center gap-2 animate-fly-in">
          <svg class="w-5 h-5 text-red-400" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
          </svg>
          <p class="text-red-300 text-sm">{{ error }}</p>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full py-3 px-4 rounded-lg bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white font-semibold shadow-lg hover:shadow-xl transition-all duration-200 transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none flex items-center justify-center gap-2">
          <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>{{ loading ? 'Signing in...' : 'Sign In' }}</span>
          <svg *ngIf="!loading" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
          </svg>
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <div class="flex-1 border-t border-blue-500/30"></div>
        <span class="px-4 text-blue-300 text-sm">New to Pilot Portal?</span>
        <div class="flex-1 border-t border-blue-500/30"></div>
      </div>

      <!-- Register Link -->
      <div class="text-center">
        <a routerLink="/register" class="inline-flex items-center gap-2 text-cyan-400 hover:text-cyan-300 font-medium transition-colors">
          <span>Create your account</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
          </svg>
        </a>
      </div>

    </div>

    <!-- Footer -->
    <div class="text-center mt-6 text-blue-200 text-sm animate-fly-in" style="animation-delay: 0.4s;">
      <p>Secure • Reliable • Professional</p>
    </div>

  </div>
</div>
