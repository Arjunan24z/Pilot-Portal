<!-- Floating Button -->
<button
  (click)="toggle()"
  class="fixed bottom-6 right-6 bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 text-white p-4 rounded-full shadow-2xl z-50 transition-all duration-300 transform hover:scale-110 group animate-float"
  title="Aviation AI Assistant">
  <svg *ngIf="!show" class="w-6 h-6 transition-transform group-hover:rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
  </svg>
  <svg *ngIf="show" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
  </svg>
  
  <!-- Notification Badge -->
  <span *ngIf="!show && messages.length === 0" class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
</button>

<!-- Chat Panel -->
<div
  *ngIf="show"
  class="fixed bottom-24 right-6 w-[400px] h-[600px] glass rounded-2xl shadow-2xl flex flex-col z-50 border border-white/20 animate-fly-in"
  style="backdrop-filter: blur(20px);">

  <!-- Header -->
  <div class="flex justify-between items-center px-5 py-4 border-b border-white/10 bg-gradient-to-r from-blue-600/20 to-cyan-600/20">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center shadow-lg">
        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
          <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/>
        </svg>
      </div>
      <div>
        <h3 class="text-white font-semibold text-sm">Aviation AI Assistant</h3>
        <p class="text-xs text-blue-200 flex items-center gap-1">
          <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
          Online
        </p>
      </div>
    </div>
    <button (click)="toggle()" class="text-slate-300 hover:text-white transition-colors p-1 hover:bg-white/10 rounded">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Quick Actions -->
  <div *ngIf="messages.length === 0" class="px-4 py-3 border-b border-white/10">
    <p class="text-xs text-slate-300 mb-2">Quick questions:</p>
    <div class="flex flex-wrap gap-2">
      <button 
        (click)="sendQuickMessage('What are medical certificate requirements?')"
        class="text-xs px-3 py-1.5 bg-blue-500/20 hover:bg-blue-500/30 text-blue-200 rounded-full transition-colors border border-blue-500/30">
        Medical Requirements
      </button>
      <button 
        (click)="sendQuickMessage('Explain pilot license types')"
        class="text-xs px-3 py-1.5 bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-200 rounded-full transition-colors border border-cyan-500/30">
        License Types
      </button>
      <button 
        (click)="sendQuickMessage('How do I maintain flight currency?')"
        class="text-xs px-3 py-1.5 bg-purple-500/20 hover:bg-purple-500/30 text-purple-200 rounded-full transition-colors border border-purple-500/30">
        Currency Rules
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div #messageContainer class="flex-1 overflow-y-auto p-4 space-y-3">
    
    <!-- Welcome Message -->
    <div *ngIf="messages.length === 0" class="text-center py-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-blue-500/20 to-cyan-500/20 mb-3 border border-blue-500/30">
        <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
      </div>
      <h4 class="text-white font-medium mb-1">Welcome, Pilot!</h4>
      <p class="text-sm text-slate-300">Ask me anything about aviation, regulations, or flight operations.</p>
    </div>

    <!-- Chat Messages -->
    <div *ngFor="let msg of messages" class="animate-fly-in">
      <div [ngClass]="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
        <div [ngClass]="{
            'bg-gradient-to-r from-blue-600 to-cyan-600 text-white': msg.role === 'user',
            'bg-slate-800/80 text-slate-100 border border-slate-700': msg.role === 'assistant'
          }" 
          class="max-w-[85%] px-4 py-2.5 rounded-2xl shadow-lg">
          <p class="text-sm whitespace-pre-wrap">{{ msg.text }}</p>
          <span class="text-xs opacity-70 mt-1 block">{{ msg.timestamp }}</span>
        </div>
      </div>
    </div>

    <!-- Loading Indicator -->
    <div *ngIf="loading" class="flex justify-start animate-fly-in">
      <div class="bg-slate-800/80 border border-slate-700 px-4 py-3 rounded-2xl shadow-lg flex items-center gap-2">
        <div class="flex gap-1">
          <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce"></div>
          <div class="w-2 h-2 bg-cyan-400 rounded-full animate-bounce" style="animation-delay: 0.1s;"></div>
          <div class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0.2s;"></div>
        </div>
        <span class="text-slate-300 text-sm">AI is thinking...</span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="p-4 border-t border-white/10 bg-slate-900/30">
    <div class="flex gap-2">
      <input
        [(ngModel)]="input"
        (keydown.enter)="send()"
        [disabled]="loading"
        placeholder="Ask about regulations, licenses, weather..."
        class="flex-1 p-3 bg-slate-800/50 border border-slate-700 rounded-xl text-slate-100 text-sm placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all disabled:opacity-50" />

      <button
        (click)="send()"
        [disabled]="loading || !input.trim()"
        class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-700 hover:to-cyan-700 disabled:from-slate-700 disabled:to-slate-700 px-4 py-3 rounded-xl text-white transition-all transform hover:scale-105 active:scale-95 disabled:transform-none disabled:cursor-not-allowed shadow-lg">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
      </button>
    </div>
    <p class="text-xs text-slate-400 mt-2 text-center">Powered by AI • Always verify critical information</p>
  </div>
</div>
