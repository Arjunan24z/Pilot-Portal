<div class="max-w-4xl mx-auto bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6 space-y-6">

  <!-- HEADER -->
  <div class="space-y-1">
    <h2 class="text-2xl font-semibold text-slate-900 dark:text-slate-100">
      Pilot Profile
    </h2>
    <p class="text-sm text-slate-600 dark:text-slate-400">
      Manage your personal information used across licenses and medical records.
    </p>
  </div>

  <!-- LOADING -->
  <p *ngIf="loading" class="text-slate-600 dark:text-slate-400 text-sm">
    Loading profile…
  </p>

  <!-- PROFILE FORM -->
  <div *ngIf="!loading" class="space-y-6">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

      <!-- FULL NAME -->
      <div>
        <label class="block text-sm text-slate-700 dark:text-slate-300 mb-1">
          Full Name
        </label>
        <input
          [(ngModel)]="profile.name"
          type="text"
          class="w-full p-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded text-slate-900 dark:text-slate-200
                 focus:outline-none focus:ring-1 focus:ring-blue-500"
        />
      </div>

      <!-- EMAIL -->
      <div>
        <label class="block text-sm text-slate-700 dark:text-slate-300 mb-1">
          Email Address
        </label>
        <input
          [(ngModel)]="profile.email"
          type="email"
          disabled
          class="w-full p-2.5 bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded text-slate-500 dark:text-slate-400 cursor-not-allowed"
        />
        <p class="text-xs text-slate-500 dark:text-slate-500 mt-1">
          Email cannot be changed
        </p>
      </div>

      <!-- PHONE -->
      <div>
        <label class="block text-sm text-slate-700 dark:text-slate-300 mb-1">
          Phone Number
        </label>
        <input
          [(ngModel)]="profile.phone"
          type="text"
          class="w-full p-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded text-slate-900 dark:text-slate-200
                 focus:outline-none focus:ring-1 focus:ring-blue-500"
        />
      </div>

      <!-- ADDRESS -->
      <div>
        <label class="block text-sm text-slate-700 dark:text-slate-300 mb-1">
          Address
        </label>
        <input
          [(ngModel)]="profile.address"
          type="text"
          class="w-full p-2.5 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded text-slate-900 dark:text-slate-200
                 focus:outline-none focus:ring-1 focus:ring-blue-500"
        />
      </div>

    </div>

    <!-- ACTIONS -->
    <div class="flex items-center gap-4 pt-4">
      <button
        (click)="saveProfile()"
        class="bg-blue-600 hover:bg-blue-500 px-5 py-2.5 rounded font-medium text-sm"
      >
        Save Changes
      </button>

      <span *ngIf="message" class="text-green-400 text-sm">
        {{ message }}
      </span>
    </div>

  </div>
</div>
